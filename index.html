<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPG Adventure Quest - Expanded World</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:Arial;text-align:center}
canvas{background:#1b1b1b;display:block;margin:10px auto;border:2px solid #fff}
#ui{margin:10px}
button{padding:6px 10px;margin:3px}
</style>
</head>
<body>
<h2>RPG Adventure Quest</h2>
<canvas id="game" width="640" height="420"></canvas>
<div id="ui">
<p id="story">Explore dungeons, find keys, unlock doors!</p>
<button onclick="saveGame()">Save</button>
<button onclick="loadGame()">Load</button>
</div>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const story=document.getElementById('story');

const TILE=32;
const W=40,H=30;

// camera
let camX=0,camY=0;

// animation
let animFrame=0;
let animTick=0;

// map: 0 floor,1 wall,2 tree,3 house(exit),4 locked door,5 key
let map=[];

function genMap(){
  let m=[];
  for(let y=0;y<H;y++){
    let row=[];
    for(let x=0;x<W;x++){
      row.push(0);
    }
    m.push(row);
  }

  // outer walls
  for(let x=0;x<W;x++){m[0][x]=1;m[H-1][x]=1;}
  for(let y=0;y<H;y++){m[y][0]=1;m[y][W-1]=1;}

  // room separators
  for(let x=0;x<W;x++) if(x==20) for(let y=1;y<H-1;y++) m[y][x]=1;
  for(let y=15;y<H;y++) for(let x=1;x<W-1;x++) if(y==15) m[y][x]=1;

  // doors
  m[15][10]=4;
  m[15][30]=4;

  // keys
  m[5][5]=5;
  m[20][25]=5;

  // exit house
  m[28][35]=3;

  return m;
}

map=genMap();

let player={x:2,y:2,hp:100,keys:0,alive:true};
let enemy={x:10,y:10,hp:60,alive:true,cd:0};

function isWall(x,y){
  return map[y] && (map[y][x]==1);
}

function isDoor(x,y){
  return map[y] && map[y][x]==4;
}

function isKey(x,y){
  return map[y] && map[y][x]==5;
}

function drawTile(x,y,val){
  let sx=x*TILE-camX;
  let sy=y*TILE-camY;

  if(val==1)ctx.fillStyle="#444";
  else if(val==2)ctx.fillStyle="green";
  else if(val==3)ctx.fillStyle="gold";
  else if(val==4)ctx.fillStyle="brown";
  else if(val==5)ctx.fillStyle="yellow";
  else ctx.fillStyle="#222";

  ctx.fillRect(sx,sy,TILE,TILE);
}

function drawMap(){
  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      drawTile(x,y,map[y][x]);
    }
  }
}

function drawPlayer(){
  let px=player.x*TILE-camX;
  let py=player.y*TILE-camY;

  ctx.fillStyle="cyan";
  ctx.beginPath();
  ctx.arc(px+16,py+16+Math.sin(animFrame)*2,10,0,Math.PI*2);
  ctx.fill();
}

function drawEnemy(){
  if(!enemy.alive)return;
  let ex=enemy.x*TILE-camX;
  let ey=enemy.y*TILE-camY;

  ctx.fillStyle="red";
  ctx.fillRect(ex,ey,28,28);
}

function clampCamera(){
  camX=player.x*TILE-canvas.width/2;
  camY=player.y*TILE-canvas.height/2;

  camX=Math.max(0,Math.min(camX,W*TILE-canvas.width));
  camY=Math.max(0,Math.min(camY,H*TILE-canvas.height));
}

function enemyAI(){
  if(!enemy.alive)return;

  let dx=player.x-enemy.x;
  let dy=player.y-enemy.y;

  let nx=enemy.x+(dx>0?1:-1);
  let ny=enemy.y+(dy>0?1:-1);

  if(!isWall(nx,enemy.y))enemy.x=nx;
  else if(!isWall(enemy.x,ny))enemy.y=ny;
}

function enemyAttack(){
  if(!enemy.alive||!player.alive)return;

  let dist=Math.abs(player.x-enemy.x)+Math.abs(player.y-enemy.y);

  if(dist<2 && enemy.cd<=0){
    player.hp-=10;
    enemy.cd=40;
    story.innerText="Enemy hits you! HP:"+player.hp;
  }

  if(enemy.cd>0)enemy.cd--;
}

function pickup(){
  if(isKey(player.x,player.y)){
    player.keys++;
    map[player.y][player.x]=0;
    story.innerText="Picked up key!";
  }
}

function openDoor(nx,ny){
  if(isDoor(nx,ny)){
    if(player.keys>0){
      player.keys--;
      map[ny][nx]=0;
      story.innerText="Door unlocked!";
      return true;
    }else return false;
  }
  return true;
}

window.addEventListener('keydown',e=>{
  if(!player.alive)return;

  let nx=player.x,ny=player.y;

  if(e.key==='ArrowUp'||e.key==='w')ny--;
  if(e.key==='ArrowDown'||e.key==='s')ny++;
  if(e.key==='ArrowLeft'||e.key==='a')nx--;
  if(e.key==='ArrowRight'||e.key==='d')nx++;

  if(openDoor(nx,ny) && !isWall(nx,ny)){
    player.x=nx;
    player.y=ny;
  }
});

function update(){
  if(player.hp<=0){player.alive=false;story.innerText="You DIED 💀";}
  if(enemy.hp<=0)enemy.alive=false;
}

function saveGame(){
  localStorage.setItem('rpg2',JSON.stringify({player,enemy,map}));
}

function loadGame(){
  let d=JSON.parse(localStorage.getItem('rpg2'));
  if(d){player=d.player;enemy=d.enemy;map=d.map;}
}

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  clampCamera();

  drawMap();
  drawPlayer();
  drawEnemy();

  enemyAI();
  enemyAttack();
  pickup();
  update();

  animTick++;
  if(animTick%10==0)animFrame+=0.2;

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
