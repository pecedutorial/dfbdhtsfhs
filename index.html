<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPG Adventure Quest</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:Arial;text-align:center}
canvas{background:#1b1b1b;display:block;margin:10px auto;border:2px solid #fff}
#ui{margin:10px}
button{padding:6px 10px;margin:3px}
</style>
</head>
<body>
<h2>RPG Adventure Quest</h2>
<canvas id="game" width="640" height="420"></canvas>
<div id="ui">
<p id="story">Find the dungeon exit and defeat enemies!</p>
<button onclick="saveGame()">Save</button>
<button onclick="loadGame()">Load</button>
</div>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const story=document.getElementById('story');

const TILE=32;
let level=1;

// 0 floor, 1 wall, 2 tree, 3 house
function genMap(){
  let map=[];
  for(let y=0;y<13;y++){
    let row=[];
    for(let x=0;x<20;x++){
      if(Math.random()<0.1) row.push(1);
      else if(Math.random()<0.05) row.push(2);
      else if(Math.random()<0.03) row.push(3);
      else row.push(0);
    }
    map.push(row);
  }
  return map;
}

let map=genMap();

let player={x:1,y:1,hp:100,atk:10,def:5,inv:["sword"],weapon:"sword"};

let enemy={x:10,y:5,hp:50,atk:8};

let quest="Defeat enemy and reach house";

function drawMap(){
  for(let y=0;y<map.length;y++){
    for(let x=0;x<map[y].length;x++){
      if(map[y][x]==1)ctx.fillStyle="#444";
      else if(map[y][x]==2)ctx.fillStyle="green";
      else if(map[y][x]==3)ctx.fillStyle="#888";
      else ctx.fillStyle="#222";
      ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
    }
  }
}

function drawPlayer(){
  ctx.fillStyle="cyan";
  ctx.fillRect(player.x*TILE,player.y*TILE,TILE,TILE);
}

function drawEnemy(){
  ctx.fillStyle="red";
  ctx.fillRect(enemy.x*TILE,enemy.y*TILE,TILE,TILE);
}

function isWall(x,y){
  return map[y] && map[y][x] && map[y][x]!=0;
}

// enemy AI avoids walls
function enemyAI(){
  let dx=player.x-enemy.x;
  let dy=player.y-enemy.y;
  let nx=enemy.x+(dx>0?1:-1);
  let ny=enemy.y+(dy>0?1:-1);

  if(!isWall(nx,enemy.y)) enemy.x=nx;
  else if(!isWall(enemy.x,ny)) enemy.y=ny;
}

// combat
function attack(){
  if(Math.abs(player.x-enemy.x)<2&&Math.abs(player.y-enemy.y)<2){
    enemy.hp-=player.atk;
    story.innerText="Hit enemy! HP: "+enemy.hp;
    if(enemy.hp<=0) story.innerText="Enemy defeated! Find exit!";
  }
}

function defend(){
  player.def+=2;
  setTimeout(()=>player.def-=2,2000);
  story.innerText="Defending";
}

function spell(){
  enemy.hp-=20;
  story.innerText="Spell cast!";
}

window.addEventListener('keydown',e=>{
  let nx=player.x,ny=player.y;

  if(e.key==='ArrowUp'||e.key==='w')ny--;
  if(e.key==='ArrowDown'||e.key==='s')ny++;
  if(e.key==='ArrowLeft'||e.key==='a')nx--;
  if(e.key==='ArrowRight'||e.key==='d')nx++;

  if(e.key===' ')attack();
  if(e.key==='q')defend();
  if(e.key==='e')spell();

  if(!isWall(nx,ny)){
    player.x=nx;
    player.y=ny;
  }
});

function checkQuest(){
  if(enemy.hp<=0 && map[player.y][player.x]==3){
    story.innerText="Quest Complete! Level up!";
    level++;
    map=genMap();
    enemy={x:5,y:5,hp:60+level*10,atk:8};
  }
}

function saveGame(){
  localStorage.setItem('rpg',JSON.stringify({player,enemy,map,level}));
  story.innerText="Saved";
}

function loadGame(){
  let d=JSON.parse(localStorage.getItem('rpg'));
  if(d){player=d.player;enemy=d.enemy;map=d.map;level=d.level;story.innerText="Loaded";}
}

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawMap();
  drawPlayer();
  drawEnemy();
  enemyAI();
  checkQuest();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
