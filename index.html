<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adventure Quest Expanded</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    text-align: center;
  }
  canvas {
    background: #1e1e1e;
    display: block;
    margin: 10px auto;
    border: 2px solid white;
  }
  #ui {
    margin: 10px;
  }
  button {
    padding: 8px 12px;
    margin: 4px;
    cursor: pointer;
  }
</style>
</head>
<body>
<h1>Adventure Quest Expanded</h1>
<canvas id="game" width="600" height="400"></canvas>
<div id="ui">
  <p id="story">Explore the world using WASD or Arrow Keys</p>
  <button onclick="saveGame()">Save</button>
  <button onclick="loadGame()">Load</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const story = document.getElementById("story");

// Player characters
let players = [
  { x: 50, y: 50, color: "lime", hp: 100, name: "Hero" },
  { x: 80, y: 50, color: "cyan", hp: 100, name: "Mage" }
];

let activePlayer = 0;

// Enemy
let enemy = { x: 300, y: 200, size: 20, hp: 50 };

// Sounds (simple placeholders)
const moveSound = new Audio();
const hitSound = new Audio();

// Map size
const mapSize = 1000;

function drawMap() {
  ctx.fillStyle = "#222";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = "#333";
  for (let i = 0; i < canvas.width; i += 40) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
  }
  for (let i = 0; i < canvas.height; i += 40) {
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
  }
}

function drawPlayers() {
  players.forEach((p, i) => {
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, 20, 20);
    ctx.fillStyle = "white";
    ctx.fillText(p.name + " HP:" + p.hp, p.x - 10, p.y - 5);
  });
}

function drawEnemy() {
  ctx.fillStyle = "red";
  ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
}

function moveEnemy() {
  let p = players[0];
  if (enemy.x < p.x) enemy.x++;
  if (enemy.x > p.x) enemy.x--;
  if (enemy.y < p.y) enemy.y++;
  if (enemy.y > p.y) enemy.y--;
}

function collision() {
  let p = players[0];
  if (Math.abs(p.x - enemy.x) < 20 && Math.abs(p.y - enemy.y) < 20) {
    p.hp -= 1;
    story.innerText = "Enemy attacking! HP: " + p.hp;
  }
}

// Keyboard controls
window.addEventListener("keydown", (e) => {
  let p = players[activePlayer];

  switch(e.key) {
    case "ArrowUp": case "w": p.y -= 10; break;
    case "ArrowDown": case "s": p.y += 10; break;
    case "ArrowLeft": case "a": p.x -= 10; break;
    case "ArrowRight": case "d": p.x += 10; break;
  }
});

function saveGame() {
  localStorage.setItem("save", JSON.stringify({ players, enemy }));
  story.innerText = "Game Saved!";
}

function loadGame() {
  let data = JSON.parse(localStorage.getItem("save"));
  if (data) {
    players = data.players;
    enemy = data.enemy;
    story.innerText = "Game Loaded!";
  }
}

function gameLoop() {
  drawMap();
  drawPlayers();
  drawEnemy();
  moveEnemy();
  collision();

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
