<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPG Adventure Quest - Door Exit Fix</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:Arial;text-align:center}
canvas{background:#1b1b1b;display:block;margin:10px auto;border:2px solid #fff}
#ui{margin:10px}
button{padding:6px 10px;margin:3px}
</style>
</head>
<body>
<h2>RPG Adventure Quest</h2>
<canvas id="game" width="640" height="420"></canvas>
<div id="ui">
<p id="story">Doors now place you in front of exits 🚪</p>
<button onclick="saveGame()">Save</button>
<button onclick="loadGame()">Load</button>
</div>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const story=document.getElementById('story');

const TILE=32;
const W=40,H=30;

let camX=0,camY=0;
let anim=0;

let rooms=[];

function empty(){
  let m=[];
  for(let y=0;y<H;y++){
    let r=[];
    for(let x=0;x<W;x++) r.push(0);
    m.push(r);
  }
  return m;
}

function roomA(){
  let m=empty();
  for(let x=0;x<W;x++){m[0][x]=1;m[H-1][x]=1;}
  for(let y=0;y<H;y++){m[y][0]=1;m[y][W-1]=1;}

  m[15][20]=4; // door to B
  m[10][10]=5;
  return m;
}

function roomB(){
  let m=empty();
  for(let x=0;x<W;x++){m[0][x]=1;m[H-1][x]=1;}
  for(let y=0;y<H;y++){m[y][0]=1;m[y][W-1]=1;}

  m[10][2]=4; // door back
  m[20][30]=5;
  return m;
}

rooms=[roomA(),roomB()];

let currentRoom=0;
let map=rooms[currentRoom];

let player={x:2,y:2,hp:100,maxHp:100,atk:20,alive:true,keys:0};

function isWall(x,y){return map[y]&&map[y][x]==1;}
function isDoor(x,y){return map[y]&&map[y][x]==4;}
function isKey(x,y){return map[y]&&map[y][x]==5;}

// FIXED DOOR TRANSITION WITH EXIT TILE POSITIONING
function switchRoom(nx,ny){
  // ROOM A -> ROOM B
  if(currentRoom==0 && map[ny][nx]==4){
    currentRoom=1;
    map=rooms[currentRoom];

    // exit position in front of corresponding door
    player.x=3;
    player.y=10;

    story.innerText="Entered Room B 🚪";
  }

  // ROOM B -> ROOM A
  else if(currentRoom==1 && map[ny][nx]==4){
    currentRoom=0;
    map=rooms[currentRoom];

    // exit position in front of corresponding door
    player.x=19;
    player.y=15;

    story.innerText="Back to Room A 🚪";
  }
}

function clampCam(){
  camX=player.x*TILE-canvas.width/2;
  camY=player.y*TILE-canvas.height/2;
  camX=Math.max(0,Math.min(camX,W*TILE-canvas.width));
  camY=Math.max(0,Math.min(camY,H*TILE-canvas.height));
}

function drawTile(x,y,v){
  let sx=x*TILE-camX;
  let sy=y*TILE-camY;

  if(v==1)ctx.fillStyle="#444";
  else if(v==4)ctx.fillStyle="#8B4513";
  else if(v==5)ctx.fillStyle="gold";
  else ctx.fillStyle="#222";

  ctx.fillRect(sx,sy,TILE,TILE);
}

function drawMap(){
  for(let y=0;y<H;y++)
    for(let x=0;x<W;x++)
      drawTile(x,y,map[y][x]);
}

function drawPlayer(){
  let px=player.x*TILE-camX;
  let py=player.y*TILE-camY;

  ctx.fillStyle="cyan";
  ctx.beginPath();
  ctx.arc(px+16,py+16+Math.sin(anim)*2,10,0,Math.PI*2);
  ctx.fill();
}

window.addEventListener('keydown',e=>{
  let nx=player.x,ny=player.y;

  if(e.key==='ArrowUp'||e.key==='w')ny--;
  if(e.key==='ArrowDown'||e.key==='s')ny++;
  if(e.key==='ArrowLeft'||e.key==='a')nx--;
  if(e.key==='ArrowRight'||e.key==='d')nx++;

  if(!isWall(nx,ny)){
    player.x=nx;
    player.y=ny;

    // CHECK DOOR AFTER MOVEMENT
    switchRoom(nx,ny);
  }
});

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  clampCam();
  drawMap();
  drawPlayer();

  anim+=0.1;

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
